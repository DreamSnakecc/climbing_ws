robot:
  name: "Climbing Robot"
  version: "1.0"
  description: "Configuration parameters for the climbing robot."

sensors:
  imu:
    type: "IMU"
    port: "/dev/ttyUSB_imu"
    baudrate: 921600
    protocol: "fdilink"
  
  fan:
    type: "Fan"
    port: "/dev/ttyUSB_fan"
    baudrate: 115200
    protocol: "custom"

control:
  swing_leg:
    max_torque: 10.0
    min_torque: 0.5
    control_frequency: 100.0

  stance_force:
    required_adhesion_force: 5.0
    normal_force_limit: 10.0

logging:
  log_directory: "~/.ros/climbing_logs"
  log_level: "INFO"
  enable_state_logger: true

mission:
  default_mission: "climb"
  mission_timeout: 300  # seconds

parameters:
  attachment_ready_mask: true
  preload_ready_mask: true
  wall_touch_mask: true
  slip_risk_threshold: 0.5